name: Test

on:
  push:

jobs:
  test:
    name: Test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Namespace Linux amd64
            runner:
              - nscloud-ubuntu-22.04-amd64-4x8-with-cache
              - nscloud-cache-size-50gb
              - nscloud-cache-tag-actions-setup-nix-nix-store-cache
            namespacelabs: 'true'
          - name: Namespace Linux arm64
            runner:
              - nscloud-ubuntu-22.04-arm64-4x8-with-cache
              - nscloud-cache-size-50gb
              - nscloud-cache-tag-actions-setup-nix-arm64-nix-store-cache
            namespacelabs: 'true'
          - name: Namespace macOS arm64
            runner:
              - nscloud-macos-sequoia-arm64-6x14-with-cache
              - nscloud-cache-size-50gb
              # Dedicated single-writer tag: on the shared darwin volume, commits from
              # other org jobs race the store image while it rolls out, making the
              # attach path impossible to exercise deterministically in CI.
              - nscloud-cache-tag-actions-setup-nix-darwin-test
            namespacelabs: 'true'
          - name: GitHub Linux amd64
            runner:
              - ubuntu-latest
            namespacelabs: 'false'
          - name: GitHub Linux arm64
            runner:
              - ubuntu-24.04-arm
            namespacelabs: 'false'
          - name: GitHub macOS arm64
            runner:
              - macos-latest
            namespacelabs: 'false'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      # uses: ./ needs the repo present before the action runs, so check out here
      # and disable the action's own checkout.
      - uses: actions/checkout@v6
      - uses: ./
        with:
          checkout: 'false'
          namespacelabs: ${{ matrix.namespacelabs }}

      - name: Verify Determinate Nix + lazy-trees
        run: |
          set -euo pipefail
          nix --version
          nix --version | grep -q "Determinate Nix"
          lazy="$(nix config show lazy-trees)"
          echo "lazy-trees = $lazy"
          [ "$lazy" = "true" ]

      - name: Time devshell evals (2nd should be eval-cache warm)
        run: |
          set -euo pipefail
          time nix develop .#ci -c true
          time nix develop .#ci -c true

      # Regression guard for the macOS checkout: the workspace must be a loose-ref
      # repo (nix reads git flakes via libgit2, which cannot open reftable), and nix
      # must be able to read it as a git flake.
      - name: Verify workspace is nix-readable git (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          fmt="$(git rev-parse --show-ref-format)"
          echo "ref-format: $fmt"
          [ "$fmt" = "files" ]
          nix flake metadata "git+file://$PWD" > /dev/null
          echo "nix can read the workspace flake"
