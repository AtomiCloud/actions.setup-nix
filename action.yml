name: Setup AtomiCloud CI Nix
description: 'Setup AtomiCloud CI Nix (Compatible with Namespace)'
inputs:
  namespacelabs:
    default: 'true'
    description: "Using Namespace Lab's runners"
  darwin-cache-path:
    default: '/tmp/nix-cache'
    description: 'Mount path for the Namespace cache volume used as a file:// binary cache on macOS'
  checkout:
    default: 'true'
    description: 'Whether to checkout the repository'
  short-length:
    default: 7
    description: length for short values
  auth-bot-app-id:
    default: ''
    description: App Id for auth bot
  auth-bot-secret-key:
    default: ''
    description: Private key for auth bot
  attic:
    default: 'true'
    description: 'Configure attic as a substituter. Reads need no token (the cache is public); pushes additionally require attic-token.'
  attic-user:
    default: 'primordial'
    description: 'Local server alias used by `attic login`'
  attic-url:
    default: 'https://attic.primordial.atomi.cloud'
    description: 'Pull URL (Cloudflare-proxied; NARs are edge-cached)'
  attic-push-url:
    default: 'https://attic-direct.primordial.atomi.cloud'
    description: 'Push URL (DNS-only, bypasses the Cloudflare 100MB request-body limit that 413s large NAR uploads)'
  attic-public-key:
    default: 'primordial:puK/sRe9wgfcreXNCR+rym2gwLuICwIWyAwTSG9ctkU='
    description: 'Public key for attic'
  attic-cache:
    default: 'primordial'
    description: 'Attic cache name'
  attic-token:
    default: ''
    description: 'Token for attic'

branding:
  color: blue
  icon: settings

runs:
  using: 'composite'
  steps:
    - name: Inject enhanced GitHub environment variables
      uses: rlespinasse/github-slug-action@v5.x
      with:
        short-length: ${{ inputs.short-length }}

    # NOTE (macOS casing): reftable refs would dodge the APFS case-collision problem,
    # but nix reads git flakes through libgit2, which cannot open reftable repos
    # ("unsupported extension name extensions.refstorage") — so loose refs it is, and
    # macOS instead avoids fetching foreign branch refs altogether (see below).
    - name: Generate Github App Token
      uses: actions/create-github-app-token@v3
      if: inputs.auth-bot-app-id != '' && inputs.auth-bot-secret-key != ''
      id: app-token
      with:
        app-id: ${{ inputs.auth-bot-app-id }}
        private-key: ${{ inputs.auth-bot-secret-key }}

    - name: Checkout Repository With Auth Bot
      if: inputs.checkout == 'true' && inputs.auth-bot-app-id != '' && inputs.auth-bot-secret-key != '' && runner.os != 'macOS'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ steps.app-token.outputs.token }}

    - name: Checkout Repository With Auth Bot (macOS)
      if: inputs.checkout == 'true' && inputs.auth-bot-app-id != '' && inputs.auth-bot-secret-key != '' && runner.os == 'macOS'
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
        token: ${{ steps.app-token.outputs.token }}

    - name: Checkout Config
      if: inputs.checkout == 'true' && inputs.auth-bot-app-id != '' && inputs.auth-bot-secret-key != ''
      shell: bash
      run: |
        git config user.name auth-bot
        git config user.email auth-bot@atomi.cloud

    - name: Checkout Repository
      if: inputs.checkout == 'true' && inputs.auth-bot-app-id == '' && inputs.auth-bot-secret-key == '' && runner.os != 'macOS'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Checkout Repository (macOS)
      if: inputs.checkout == 'true' && inputs.auth-bot-app-id == '' && inputs.auth-bot-secret-key == '' && runner.os == 'macOS'
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    # macOS runners checkout onto case-insensitive APFS: fetch-depth 0 fetches EVERY
    # branch ref, and two branches whose names differ only in case
    # (Adelphi-Liong/feat-1 vs adelphi-liong/feat-2) collide as loose-ref files and
    # corrupt the checkout. So on macOS: shallow single-ref checkout above, then deepen
    # ONLY the current ref (full history) and grab tags — foreign branch refs are never
    # written, so they can never collide.
    - name: Deepen current ref (macOS)
      if: inputs.checkout == 'true' && runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
          git fetch --unshallow --tags origin "$(git rev-parse HEAD)"
        else
          git fetch --tags origin "$(git rev-parse HEAD)"
        fi

    # COMPUTE NIX CONFIG
    # One source of truth for substituters / trusted-public-keys, consumed by whichever
    # single installer runs below. Keeps the existing combinations byte-identical while
    # adding the macOS Namespace file:// binary cache.
    - name: Compute Nix Config
      id: nixconf
      shell: bash
      env:
        NAMESPACELABS: ${{ inputs.namespacelabs }}
        RUNNER_OS: ${{ runner.os }}
        ATTIC: ${{ inputs.attic }}
        ATTIC_URL: ${{ inputs.attic-url }}
        ATTIC_CACHE: ${{ inputs.attic-cache }}
        ATTIC_PUBLIC_KEY: ${{ inputs.attic-public-key }}
        DARWIN_CACHE_PATH: ${{ inputs.darwin-cache-path }}
      run: |
        set -euo pipefail
        base_subs="https://nix-community.cachix.org?priority=41 https://numtide.cachix.org?priority=42 https://cache.nixos.org/"
        base_keys="cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= numtide.cachix.org-1:2ps1kLBUWjxIneOy1Ik6cQjb41X0iXVXeHigGmycPPE="

        subs="$base_subs"
        keys="$base_keys"

        # macOS Namespace runners cannot mount /nix (sealed APFS root); prepend a local
        # file:// binary cache served off the Namespace cache volume instead.
        darwin_ns="false"
        if [ "$NAMESPACELABS" = "true" ] && [ "$RUNNER_OS" = "macOS" ]; then
          darwin_ns="true"
          subs="file://${DARWIN_CACHE_PATH}?priority=10 $subs"
        fi

        if [ "$ATTIC" = "true" ]; then
          # Priority 35: ahead of cache.nixos.org (40) — attic is a full mirror
          # served zstd-compressed from the Cloudflare edge, which beats nixos'
          # xz over origin for both transfer and decompress. Misses fall through.
          subs="$subs ${ATTIC_URL}/${ATTIC_CACHE}?priority=35"
          keys="$keys $ATTIC_PUBLIC_KEY"
        fi

        {
          echo "config<<__ATOMI_NIXCONF__"
          echo "fallback = true"
          echo "substituters = $subs"
          echo "trusted-public-keys = $keys"
          # Paths copied into the file:// cache via `nix copy` are unsigned.
          if [ "$darwin_ns" = "true" ]; then
            echo "require-sigs = false"
          fi
          # Lazy trees skip copying/hashing the source tree into the store at
          # eval time. Determinate Nix runs on every path now, so this is safe
          # unconditionally.
          echo "lazy-trees = true"
          echo "__ATOMI_NIXCONF__"
        } >> "$GITHUB_OUTPUT"

    # NAMESPACE LAB VERSION (Linux): persist the nix store directly on the cache volume.
    - name: Setup Nix Folder
      shell: bash
      if: inputs.namespacelabs == 'true' && runner.os == 'Linux'
      run: |
        sudo mkdir /nix
        sudo chown "$USER" /nix
    - name: Cache Nix
      uses: namespacelabs/nscloud-cache-action@v1
      if: inputs.namespacelabs == 'true' && runner.os == 'Linux'
      with:
        # ~/.cache/nix holds the flake eval cache — persisting it lets repeat
        # `nix develop`/`nix eval` invocations skip re-evaluation.
        path: |
          /nix
          ~/.cache/nix

    # NAMESPACE LAB VERSION (macOS): the APFS root volume is sealed, so /nix cannot be a
    # mount point. Persist a local file:// binary cache on the Namespace cache volume
    # instead. Must run AFTER checkout (Namespace requirement).
    - name: Cache Nix (Darwin file:// binary cache)
      uses: namespacelabs/nscloud-cache-action@v1
      if: inputs.namespacelabs == 'true' && runner.os == 'macOS'
      with:
        # ~/.cache/nix holds the flake eval cache and the flake-input fetcher cache —
        # doubly valuable on macOS where /nix itself starts empty every run.
        path: |
          ${{ inputs.darwin-cache-path }}
          ~/.cache/nix

    # The cache action mounts the path root-owned on macOS, but the post-push hook's
    # `nix copy` runs as the runner user and dies with EACCES ("opening file …: Permission
    # denied"), leaving the cache permanently empty. Own it — the macOS mirror of the
    # Linux branch's `sudo chown $USER /nix`.
    - name: Own Darwin cache path
      shell: bash
      if: inputs.namespacelabs == 'true' && runner.os == 'macOS'
      env:
        DARWIN_CACHE_PATH: ${{ inputs.darwin-cache-path }}
      run: |
        set -euo pipefail
        target="$(readlink -f "$DARWIN_CACHE_PATH" 2>/dev/null || echo "$DARWIN_CACHE_PATH")"
        sudo chown -R "$USER" "$target"

    # The cache action can mount ~/.cache/nix root-owned (same failure mode as the darwin
    # cache path above); nix then silently skips writing the eval cache, wasting the mount.
    - name: Own Nix eval cache
      shell: bash
      if: inputs.namespacelabs == 'true'
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.cache/nix"
        sudo chown -R "$USER" "$HOME/.cache/nix"

    # STORE IMAGE (Namespace macOS): a persisted APFS sparse image on the cache volume
    # IS the nix store. Attaching it at /nix (~1s) replaces the multi-GB NAR unpack
    # that otherwise dominates warm macOS jobs. Every failure path discards the image
    # and falls back to the plain file:// substitution flow — and Namespace commits
    # the volume only on job success, so a crashed job's dirty image dies with its
    # fork instead of propagating.
    - name: Attach Nix store image (macOS)
      id: niximg
      shell: bash
      if: inputs.namespacelabs == 'true' && runner.os == 'macOS'
      env:
        DARWIN_CACHE_PATH: ${{ inputs.darwin-cache-path }}
      run: |
        set -euo pipefail
        img="${DARWIN_CACHE_PATH}/nix-store.sparseimage"
        attached=false
        if [ -f "$img" ]; then
          # /nix must exist on the sealed root before anything can mount there.
          if [ ! -d /nix ]; then
            printf 'nix\n' | sudo tee -a /etc/synthetic.conf >/dev/null
            sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -B / 2>/dev/null ||
              sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -t / 2>/dev/null || true
          fi
          if [ -d /nix ] && sudo hdiutil attach -mountpoint /nix -nobrowse -owners on "$img" >/dev/null; then
            if [ -d /nix/store ] && [ -x /nix/var/nix/profiles/default/bin/nix-daemon ] &&
              sudo sqlite3 /nix/var/nix/db/db.sqlite 'PRAGMA quick_check;' 2>/dev/null | grep -q '^ok$'; then
              echo "✅ store image attached at /nix"
              attached=true
            else
              echo "::warning::store image failed verification; discarding it"
              sudo hdiutil detach /nix -force >/dev/null 2>&1 || true
              rm -f "$img"
            fi
          else
            echo "::warning::store image could not be attached; discarding it"
            rm -f "$img"
          fi
        else
          echo "no store image yet; post hook will create one"
        fi
        echo "attached=$attached" >> "$GITHUB_OUTPUT"
        # The post hook must distinguish image-backed /nix from the installer's own
        # APFS volume (both are mounts) — tell it explicitly.
        echo "ATOMI_NIX_IMAGE_ATTACHED=$attached" >> "$GITHUB_ENV"

    # INSTALL NIX — the Determinate installer runs on every path (it is the only
    # installer that supports lazy-trees), fed by the single computed config above.
    #
    # On Namespace Linux the warm cache volume persists the previous run's install
    # receipt at /nix/receipt.json; the installer refuses to run when it exists
    # ("Nix is already installed") even though this VM is fresh and still needs the
    # daemon, /etc/nix and profiles set up. Drop the receipt (and the previous
    # profile symlinks the installer wants to create itself) and install over the
    # existing store — store paths and the sqlite db are untouched, which is the
    # whole point of the volume.
    - name: Prepare warm Nix store for installer (Namespace Linux)
      shell: bash
      if: inputs.namespacelabs == 'true' && runner.os == 'Linux'
      run: |
        set -euo pipefail
        sudo rm -f /nix/receipt.json
        sudo rm -rf /nix/var/nix/profiles/default /nix/var/nix/profiles/default-*-link

    # When the store image is attached, the installer must NOT run — it creates its
    # own APFS volume and mounts it over /nix, shadowing the image (observed). The
    # bootstrap below replaces it, which also removes its ~60s from the warm path.
    - name: Install Nix (Determinate Systems)
      if: steps.niximg.outputs.attached != 'true'
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: ${{ steps.nixconf.outputs.config }}

    - name: Bootstrap Nix from store image (macOS)
      shell: bash
      if: steps.niximg.outputs.attached == 'true'
      env:
        NIX_CONF: ${{ steps.nixconf.outputs.config }}
      run: |
        set -euo pipefail
        profile=/nix/var/nix/profiles/default

        # nix.conf — same computed config the installer would have received.
        sudo mkdir -p /etc/nix
        {
          echo "build-users-group = nixbld"
          echo "experimental-features = nix-command flakes"
          printf '%s\n' "$NIX_CONF"
        } | sudo tee /etc/nix/nix.conf >/dev/null

        # Build users: the fresh VM has none; the daemon refuses to build without
        # them. 8 is plenty for CI.
        if ! dscl . -read /Groups/nixbld >/dev/null 2>&1; then
          sudo dscl . -create /Groups/nixbld PrimaryGroupID 30000
          for i in $(seq 1 8); do
            sudo dscl . -create "/Users/_nixbld$i" UniqueID $((30000 + i))
            sudo dscl . -create "/Users/_nixbld$i" PrimaryGroupID 30000
            sudo dscl . -create "/Users/_nixbld$i" UserShell /usr/bin/false
            sudo dscl . -create "/Users/_nixbld$i" NFSHomeDirectory /var/empty
            sudo dscl . -append /Groups/nixbld GroupMembership "_nixbld$i"
          done
        fi

        # Plain nix-daemon from the image's profile (no determinate-nixd supervisor
        # on this path — the standard daemon socket is all the client needs).
        sudo tee /Library/LaunchDaemons/org.nixos.nix-daemon.plist >/dev/null <<PLIST
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>Label</key><string>org.nixos.nix-daemon</string>
          <key>ProgramArguments</key>
          <array><string>${profile}/bin/nix-daemon</string></array>
          <key>KeepAlive</key><true/>
          <key>EnvironmentVariables</key>
          <dict>
            <key>NIX_SSL_CERT_FILE</key><string>/etc/ssl/cert.pem</string>
            <key>PATH</key><string>${profile}/bin:/usr/bin:/bin:/usr/sbin:/sbin</string>
          </dict>
        </dict>
        </plist>
        PLIST
        sudo launchctl load -w /Library/LaunchDaemons/org.nixos.nix-daemon.plist

        for _ in $(seq 1 30); do
          [ -S /nix/var/nix/daemon-socket/socket ] && break
          sleep 1
        done
        [ -S /nix/var/nix/daemon-socket/socket ] || { echo "::error::nix-daemon socket never appeared"; exit 1; }

        echo "${profile}/bin" >> "$GITHUB_PATH"
        echo "NIX_SSL_CERT_FILE=/etc/ssl/cert.pem" >> "$GITHUB_ENV"
        "$profile/bin/nix" --version
        echo "✅ nix bootstrapped from store image (no installer)"

    # AUTOMATIC WRITE-BACK (Namespace macOS): register a post hook that pushes the realized
    # devShell closures back to the file:// cache at end of job (only on success). Composite
    # actions have no `post:`, and a relative `uses: ./...` resolves against the consumer's
    # workspace, so symlink the bundled JS sub-action into the workspace and reference it by
    # that path — works for external consumers with no version drift.
    - name: Link cache push hook (Namespace macOS)
      if: inputs.namespacelabs == 'true' && runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        ln -sfn "$GITHUB_ACTION_PATH/post-cache-push" "$GITHUB_WORKSPACE/.atomi-nix-cache-push"

    - name: Register cache push hook (Namespace macOS)
      if: inputs.namespacelabs == 'true' && runner.os == 'macOS'
      uses: ./.atomi-nix-cache-push
      with:
        cache-path: ${{ inputs.darwin-cache-path }}

    # SETUP ATTIC — nixpkgs' attic-client is prebuilt in cache.nixos.org; the upstream
    # flake would compile rust from source on cold runners.
    - name: Install Attic
      shell: bash
      if: inputs.attic-token != '' && inputs.attic == 'true'
      run: |
        nix profile install nixpkgs#attic-client

    # Login against the PUSH url: uploads must bypass the Cloudflare proxy (100MB
    # request-body cap → 413 on large NARs). Pulls still go through the proxied
    # attic-url substituter, where NARs are edge-cached.
    - name: Login to Attic
      shell: bash
      if: inputs.attic-token != '' && inputs.attic == 'true'
      run: |
        attic login "${{ inputs.attic-user }}" "${{ inputs.attic-push-url }}" "${{ inputs.attic-token }}"
